<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cacabox Overlay</title>
  <style>
    /* L'intégralité du body doit être 100% transparente par défaut.
       Les éléments apparaissent dynamiquement via JS. */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent !important;
      /* Pas de cursor — la fenêtre est click-through */
      cursor: none;
    }

    /* ─── Conteneur média (vidéo / image) ─── */
    #media-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }
    #media-container.visible { opacity: 1; }

    #media-video,
    #media-image {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 12px;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #media-video { display: block; }
    #media-image { display: none;  object-fit: contain; }

    /* ─── Conteneur message texte ─── */
    #message-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 20;
    }
    #message-container.visible { opacity: 1; }

    #message-text {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: clamp(3rem, 8vw, 9rem);
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      text-shadow:
        0 0 20px rgba(255,60,110,1),
        0 0 60px rgba(255,60,110,0.5),
        4px 4px 0 #000,
        -4px -4px 0 #000,
        4px -4px 0 #000,
        -4px 4px 0 #000;
      padding: 0 5vw;
      line-height: 1.15;
      animation: msg-bounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      max-width: 90vw;
      word-break: break-word;
    }

    @keyframes msg-bounce {
      from { transform: scale(0.3) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    /* ─── Audio player invisible ─── */
    #audio-player {
      position: fixed;
      width: 0; height: 0;
      pointer-events: none;
    }

    /* ─── Debug badge (dev seulement) ─── */
    #debug-badge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      color: #00ff87;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      pointer-events: none;
      display: none; /* Activer en dev */
    }
  </style>
</head>
<body>

  <!-- Média : vidéo ou image -->
  <div id="media-container">
    <video id="media-video" autoplay playsinline></video>
    <img   id="media-image" alt="">
  </div>

  <!-- Message texte -->
  <div id="message-container">
    <div id="message-text"></div>
  </div>

  <!-- Audio -->
  <audio id="audio-player" autoplay></audio>

  <!-- Debug -->
  <div id="debug-badge" id="debug">⚡ cacabox</div>

  <!-- Socket.io depuis le serveur (chemin relatif ou absolu selon config) -->
  <script type="module" src="./main.js"></script>
</body>
</html>
